# yaml-language-server: $schema=./node_modules/harper/config-app.schema.json

# This is the configuration file for the application.
# It specifies built-in Harper components that will load the specified feature and files.
# For more information, see https://docs.harperdb.io/docs/reference/components/built-in-extensions

# Load Environment Variables from the specified file
# loadEnv:
#   files: '.env'

# Reads GraphQL schemas to define the schema of database/tables/attributes.
graphqlSchema:
  files: 'schema.graphql'

# Runs the Next.js app as a Harper component. The npm scripts run `next build` first, then this
# component serves the prebuilt output (see the `prebuilt` note below); `harper dev` also serves it
# with hot-module reloading. Server-side code (server actions and server components) reads and writes
# Harper tables directly through the injected `tables` global — see app/actions.ts. Because this
# plugin owns HTTP routing for the app, there is no `static` or `rest` handler here.
'@harperfast/nextjs':
  package: '@harperfast/nextjs'
  # Serve a prebuilt `.next` (the npm scripts run `next build` for you) instead of building on
  # startup. On a multi-threaded Harper cluster the on-startup build races across worker threads and
  # fails, so the app never serves; prebuilt avoids that. See
  # https://github.com/HarperFast/nextjs/issues/52
  prebuilt: true
