name: Integration Test
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Generate ${{ matrix.template }} with ${{ matrix.pkg-manager }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg-manager: [npm, yarn, pnpm]
        template: [
          vanilla,
          vanilla-ts,
          react,
          react-ts,
          vue,
          vue-ts,
          nextjs,
          nextjs-ts,
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        if: matrix.pkg-manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # Pin an exact pnpm version, not a floating major. The action is SHA-pinned,
          # but `version: 11` makes it resolve to the newest 11.x at run time and
          # self-install it — so the pnpm binary itself was unpinned. pnpm 11.12.0
          # regressed that self-installer (lockfile integrity handling), breaking CI.
          # Pinning keeps CI reproducible and avoids auto-pulling an unvetted build.
          # Bump deliberately once a known-good newer version is verified.
          version: 11.13.1

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get pnpm store directory
        if: matrix.pkg-manager == 'pnpm'
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        if: matrix.pkg-manager == 'pnpm'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('package-lock.json', 'template-*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Get yarn cache directory
        if: matrix.pkg-manager == 'yarn'
        id: yarn-cache-dir
        shell: bash
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn modules
        if: matrix.pkg-manager == 'yarn'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('package-lock.json', 'template-*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Run Integration Test
        shell: bash
        run: |
          PROJECT_NAME="test-app-${{ matrix.pkg-manager }}-${{ matrix.template }}"
          export CREATE_HARPER_SKIP_UPDATE=true
          REPO_PATH=$(pwd)
          TEMP_DIR=$(mktemp -d)

          echo "Testing in temporary directory: $TEMP_DIR"

          echo "Testing with ${{ matrix.pkg-manager }} and ${{ matrix.template }}..."

          case ${{ matrix.pkg-manager }} in
            npm)
              cd "$TEMP_DIR"
              npx "$REPO_PATH" "$PROJECT_NAME" --template ${{ matrix.template }} --no-interactive --overwrite --skip-install
              ;;
            yarn)
              cd "$TEMP_DIR"
              corepack enable
              yarn node "$REPO_PATH/index.js" "$PROJECT_NAME" --template ${{ matrix.template }} --no-interactive --overwrite --skip-install
              ;;
            pnpm)
              cd "$TEMP_DIR"
              npm_config_user_agent="pnpm/$(pnpm --version)" node "$REPO_PATH/index.js" "$PROJECT_NAME" --template ${{ matrix.template }} --no-interactive --overwrite --skip-install
              ;;
          esac

          # Verification
          if [ ! -d "$PROJECT_NAME" ]; then
            echo "Error: Project directory $PROJECT_NAME was not created"
            exit 1
          fi

          if [ ! -f "$PROJECT_NAME/package.json" ]; then
            echo "Error: package.json was not created in $PROJECT_NAME"
            exit 1
          fi

          if [ ! -f "$PROJECT_NAME/.claude/launch.json" ]; then
            echo "Error: .claude/launch.json was not created in $PROJECT_NAME"
            exit 1
          fi

          cd "$PROJECT_NAME"

          echo "Installing dependencies..."
          case ${{ matrix.pkg-manager }} in
            npm)
              npm install
              ;;
            yarn)
              yarn install
              ;;
            pnpm)
              pnpm install
              ;;
          esac

          echo "Running lint..."
          ${{ matrix.pkg-manager }} run lint

          echo "Running format check..."
          ${{ matrix.pkg-manager }} run format

          # Run tests if the template defines a test script (the Next.js templates don't ship
          # unit tests — their runtime smoke below is their coverage).
          if grep -q '"test":' package.json; then
            echo "Running tests..."
            ${{ matrix.pkg-manager }} run test
          fi

          # Check for build script and run it if exists
          if grep -q '"build":' package.json; then
            echo "Running build..."
            ${{ matrix.pkg-manager }} run build
          fi

          # Boot the generated app under a real Harper instance and verify its HTTP surface. Once
          # per template — the package manager doesn't matter here. The Next.js templates route
          # through the @harperfast/nextjs plugin (no REST resources), so they use a dedicated
          # smoke that serves the prebuilt build (produced by the `build` step above) and checks the
          # Harper-backed counter reads and increments; every other template uses runtimeSmoke,
          # which also guards against the static handler swallowing REST GETs.
          if [ "${{ matrix.pkg-manager }}" = "npm" ]; then
            echo "Installing Harper..."
            npm install --global harper

            echo "Running runtime smoke test..."
            case "${{ matrix.template }}" in
              nextjs | nextjs-ts)
                node "$REPO_PATH/template.tests/nextSmoke.js" .
                ;;
              *)
                node "$REPO_PATH/template.tests/runtimeSmoke.js" .
                ;;
            esac
          fi

          echo "Integration test passed for ${{ matrix.pkg-manager }} with ${{ matrix.template }}!"
