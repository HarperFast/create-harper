# yaml-language-server: $schema=./node_modules/harper/config-app.schema.json

# This is the configuration file for the application.
# It specifies built-in Harper components that will load the specified feature and files.
# For more information, see https://docs.harperdb.io/docs/reference/components/built-in-extensions

# Load Environment Variables from the specified file
# loadEnv:
#   files: '.env'

# Reads GraphQL schemas to define the schema of database/tables/attributes.
graphqlSchema:
  files: 'schema.graphql'

# Runs the Next.js app as a Harper component. Under `harper dev` it serves the Next.js dev server
# with hot-module reloading; under `harper run` (and on `harper deploy`) it builds and serves the
# app. Server-side code (server actions and server components) reads and writes Harper tables
# directly through the injected `tables` and `transaction` globals — see app/actions.js. Because
# this plugin owns HTTP routing for the app, there is no `static` or `rest` handler here.
'@harperfast/nextjs':
  package: '@harperfast/nextjs'
